# Build, test and lint chie on Linux, macOS and Windows.
# GitHub Actions syntax; Forgejo/Gitea Actions (Codeberg & co.) read this too.
name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: build & test — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose
